name: Courtlens v2 CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'v2/**'
      - '.github/workflows/courtlens-v2.yml'
  pull_request:
    branches: [main]
    paths:
      - 'v2/**'
      - '.github/workflows/courtlens-v2.yml'

permissions:
  contents: read

concurrency:
  group: courtlens-v2-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: Verify Vite/React MV3 extension
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: v2

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: v2/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python Playwright and Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb xauth
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run delivery audit, smoke, packaging, and release readiness
        env:
          ARGUS_DELTA_TOKEN: ${{ secrets.ARGUS_DELTA_TOKEN }}
          ABN_GUID: ${{ secrets.ABN_GUID }}
          COURTLENS_ABN_GUID: ${{ secrets.COURTLENS_ABN_GUID }}
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" npm run package:extension

      - name: Upload extension archive and audit evidence
        uses: actions/upload-artifact@v6
        with:
          name: argus-delta-courtlens
          path: |
            v2/artifacts/argus-delta-courtlens.zip
            v2/artifacts/delivery-audit.json
            v2/artifacts/release-readiness.json
            v2/artifacts/SHA256SUMS
          if-no-files-found: error
          retention-days: 14

  live-smoke:
    name: Live provider smoke (optional secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: v2
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: v2/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Run live smoke
        env:
          ARGUS_DELTA_TOKEN: ${{ secrets.ARGUS_DELTA_TOKEN }}
          ABN_GUID: ${{ secrets.ABN_GUID }}
          COURTLENS_ABN_GUID: ${{ secrets.COURTLENS_ABN_GUID }}
        run: npm run smoke:live
