name: Courtlens v2 CI

on:
  push:
    branches: [main]
    paths:
      - 'v2/**'
      - '.github/workflows/courtlens-v2.yml'
  pull_request:
    branches: [main]
    paths:
      - 'v2/**'
      - '.github/workflows/courtlens-v2.yml'

permissions:
  contents: read

jobs:
  verify:
    name: Verify Vite/React MV3 extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: v2/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python Playwright and Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb xauth
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Verify tests, build, browser smoke, and unpacked extension smoke
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" npm run verify

      - name: Package extension archive
        run: node scripts/package_extension.mjs

      - name: Upload extension archive
        uses: actions/upload-artifact@v4
        with:
          name: argus-delta-courtlens
          path: v2/artifacts/argus-delta-courtlens.zip
          if-no-files-found: error
          retention-days: 14

  live-smoke:
    name: Live provider smoke (non-secret)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: v2/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Run live smoke
        run: npm run smoke:live
